name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true
      - run: |
          cd packages/adapters && vp install && vp test
      - run: |
          cd packages/aggregates && vp install && vp test
      - run: |
          cd packages/assets && vp install && vp test
      - run: |
          cd packages/contexts && vp install && vp test
      - run: |
          cd packages/controllers && vp install && vp test
      - run: |
          cd packages/domains && vp install && vp test
      - run: |
          cd packages/dtos && vp install && vp test
      - run: |
          cd packages/durable_objects && vp install && vp test
      - run: |
          cd packages/entrypoints && vp install && vp test
      - run: |
          cd packages/events && vp install && vp test
      - run: |
          cd packages/features && vp install && vp test
      - run: |
          cd packages/formatters && vp install && vp test
      - run: |
          cd packages/gateways && vp install && vp test
      - run: |
          cd packages/integration-events && vp install && vp test
      - run: |
          cd packages/jobs && vp install && vp test
      - run: |
          cd packages/logger && vp install && vp test
      - run: |
          cd packages/maintenance && vp install && vp test
      - run: |
          cd packages/migrations && vp install && vp test
      - run: |
          cd packages/models && vp install && vp test
      - run: |
          cd packages/modules && vp install && vp test
      - run: |
          cd packages/normalizers && vp install && vp test
      - run: |
          cd packages/persistence && vp install && vp test
      - run: |
          cd packages/plugins && vp install && vp test
      - run: |
          cd packages/ports && vp install && vp test
      - run: |
          cd packages/query && vp install && vp test
      - run: |
          cd packages/result && vp install && vp test
      - run: |
          cd packages/rpc && vp install && vp test
      - run: |
          cd packages/router && vp install && vp test
      - run: |
          cd packages/scripts && vp install && vp test
      - run: |
          cd packages/serializers && vp install && vp test
      - run: |
          cd packages/services && vp install && vp test
      - run: |
          cd packages/shared && vp install && vp test
      - run: |
          cd packages/sql && vp install && vp test
      - run: |
          cd packages/validators && vp install && vp test
      - run: |
          cd packages/views && vp install && vp test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true
      - run: |
          cd packages/adapters && vp install && vp run build
      - run: |
          cd packages/aggregates && vp install && vp run build
      - run: |
          cd packages/assets && vp install && vp run build
      - run: |
          cd packages/contexts && vp install && vp run build
      - run: |
          cd packages/controllers && vp install && vp run build
      - run: |
          cd packages/domains && vp install && vp run build
      - run: |
          cd packages/dtos && vp install && vp run build
      - run: |
          cd packages/durable_objects && vp install && vp run build
      - run: |
          cd packages/entrypoints && vp install && vp run build
      - run: |
          cd packages/events && vp install && vp run build
      - run: |
          cd packages/features && vp install && vp run build
      - run: |
          cd packages/formatters && vp install && vp run build
      - run: |
          cd packages/gateways && vp install && vp run build
      - run: |
          cd packages/integration-events && vp install && vp run build
      - run: |
          cd packages/jobs && vp install && vp run build
      - run: |
          cd packages/logger && vp install && vp run build
      - run: |
          cd packages/maintenance && vp install && vp run build
      - run: |
          cd packages/migrations && vp install && vp run build
      - run: |
          cd packages/models && vp install && vp run build
      - run: |
          cd packages/modules && vp install && vp run build
      - run: |
          cd packages/normalizers && vp install && vp run build
      - run: |
          cd packages/persistence && vp install && vp run build
      - run: |
          cd packages/plugins && vp install && vp run build
      - run: |
          cd packages/ports && vp install && vp run build
      - run: |
          cd packages/query && vp install && vp run build
      - run: |
          cd packages/result && vp install && vp run build
      - run: |
          cd packages/rpc && vp install && vp run build
      - run: |
          cd packages/router && vp install && vp run build
      - run: |
          cd packages/scripts && vp install && vp run build
      - run: |
          cd packages/serializers && vp install && vp run build
      - run: |
          cd packages/services && vp install && vp run build
      - run: |
          cd packages/shared && vp install && vp run build
      - run: |
          cd packages/sql && vp install && vp run build
      - run: |
          cd packages/validators && vp install && vp run build
      - run: |
          cd packages/views && vp install && vp run build

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true
      - run: |
          echo "//registry.npmjs.org/:_authToken=\${NODE_AUTH_TOKEN}" > ~/.npmrc
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm whoami
      - name: publish-shared
        run: cd packages/shared && vp install && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: publish-adapters
        run: cd packages/adapters && vp install && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: publish-aggregates
        run: cd packages/aggregates && vp install && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: publish-assets
        run: cd packages/assets && vp install && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: publish-contexts
        run: cd packages/contexts && vp install && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: publish-controllers
        run: cd packages/controllers && vp install && npm publish --provenance --access public
        env:
