      - run: |
          cd packages/views && vp install && vp run build

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    environment: npm
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
      - uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org"
      - run: npm whoami

      - name: publish-shared
        run: |
          cd packages/shared
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if ! npm view $PACKAGE_NAME@$CURRENT_VERSION version > /dev/null 2>&1; then
            vp install && npm publish --provenance --access public
          else
            echo "Version $CURRENT_VERSION of $PACKAGE_NAME already published, skipping..."
          fi

      - name: publish-adapters
        run: |
          cd packages/adapters
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          CURRENT_VERSION=$(node -p "require('./package.json').version")
