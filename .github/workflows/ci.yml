name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true
      - run: |
          cd packages/adapters && pnpm install && vp test
      - run: |
          cd packages/aggregates && pnpm install && vp test
      - run: |
          cd packages/assets && pnpm install && vp test
      - run: |
          cd packages/contexts && pnpm install && vp test
      - run: |
          cd packages/controllers && pnpm install && vp test
      - run: |
          cd packages/domains && pnpm install && vp test
      - run: |
          cd packages/dtos && pnpm install && vp test
      - run: |
          cd packages/durable_objects && pnpm install && vp test
      - run: |
          cd packages/entrypoints && pnpm install && vp test
      - run: |
          cd packages/events && pnpm install && vp test
      - run: |
          cd packages/features && pnpm install && vp test
      - run: |
          cd packages/formatters && pnpm install && vp test
      - run: |
          cd packages/gateways && pnpm install && vp test
      - run: |
          cd packages/integration-events && pnpm install && vp test
      - run: |
          cd packages/jobs && pnpm install && vp test
      - run: |
          cd packages/logger && pnpm install && vp test
      - run: |
          cd packages/maintenance && pnpm install && vp test
      - run: |
          cd packages/migrations && pnpm install && vp test
      - run: |
          cd packages/models && pnpm install && vp test
      - run: |
          cd packages/modules && pnpm install && vp test
      - run: |
          cd packages/normalizers && pnpm install && vp test
      - run: |
          cd packages/persistence && pnpm install && vp test
      - run: |
          cd packages/plugins && pnpm install && vp test
      - run: |
          cd packages/ports && pnpm install && vp test
      - run: |
          cd packages/query && pnpm install && vp test
      - run: |
          cd packages/result && pnpm install && vp test
      - run: |
          cd packages/rpc && pnpm install && vp test
      - run: |
          cd packages/router && pnpm install && vp test
      - run: |
          cd packages/scripts && pnpm install && vp test
      - run: |
          cd packages/serializers && pnpm install && vp test
      - run: |
          cd packages/services && pnpm install && vp test
      - run: |
          cd packages/shared && pnpm install && vp test
      - run: |
          cd packages/sql && pnpm install && vp test
      - run: |
          cd packages/validators && pnpm install && vp test
      - run: |
          cd packages/views && pnpm install && vp test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true
      - run: |
          cd packages/adapters && pnpm install && vp pack
      - run: |
          cd packages/aggregates && pnpm install && vp pack
      - run: |
          cd packages/assets && pnpm install && vp pack
      - run: |
          cd packages/contexts && pnpm install && vp pack
      - run: |
          cd packages/controllers && pnpm install && vp pack
      - run: |
          cd packages/domains && pnpm install && vp pack
      - run: |
          cd packages/dtos && pnpm install && vp pack
      - run: |
          cd packages/durable_objects && pnpm install && vp pack
      - run: |
          cd packages/entrypoints && pnpm install && vp pack
      - run: |
          cd packages/events && pnpm install && vp pack
      - run: |
          cd packages/features && pnpm install && vp pack
      - run: |
          cd packages/formatters && pnpm install && vp pack
      - run: |
          cd packages/gateways && pnpm install && vp pack
      - run: |
          cd packages/integration-events && pnpm install && vp pack
      - run: |
          cd packages/jobs && pnpm install && vp pack
      - run: |
          cd packages/logger && pnpm install && vp pack
      - run: |
          cd packages/maintenance && pnpm install && vp pack
      - run: |
          cd packages/migrations && pnpm install && vp pack
      - run: |
          cd packages/models && pnpm install && vp pack
      - run: |
          cd packages/modules && pnpm install && vp pack
      - run: |
          cd packages/normalizers && pnpm install && vp pack
      - run: |
          cd packages/persistence && pnpm install && vp pack
      - run: |
          cd packages/plugins && pnpm install && vp pack
      - run: |
          cd packages/ports && pnpm install && vp pack
      - run: |
          cd packages/query && pnpm install && vp pack
      - run: |
          cd packages/result && pnpm install && vp pack
      - run: |
          cd packages/rpc && pnpm install && vp pack
      - run: |
          cd packages/router && pnpm install && vp pack
      - run: |
          cd packages/scripts && pnpm install && vp pack
      - run: |
          cd packages/serializers && pnpm install && vp pack
      - run: |
          cd packages/services && pnpm install && vp pack
      - run: |
          cd packages/shared && pnpm install && vp pack
      - run: |
          cd packages/sql && pnpm install && vp pack
      - run: |
          cd packages/validators && pnpm install && vp pack
      - run: |
          cd packages/views && pnpm install && vp pack

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true
      - run: |
          cd packages/adapters && pnpm install && npm publish
      - run: |
          cd packages/aggregates && pnpm install && npm publish
      - run: |
          cd packages/assets && pnpm install && npm publish
      - run: |
          cd packages/contexts && pnpm install && npm publish
      - run: |
          cd packages/controllers && pnpm install && npm publish
      - run: |
          cd packages/domains && pnpm install && npm publish
      - run: |
          cd packages/dtos && pnpm install && npm publish
      - run: |
          cd packages/durable_objects && pnpm install && npm publish
      - run: |
          cd packages/entrypoints && pnpm install && npm publish
      - run: |
          cd packages/events && pnpm install && npm publish
      - run: |
          cd packages/features && pnpm install && npm publish
      - run: |
          cd packages/formatters && pnpm install && npm publish
      - run: |
          cd packages/gateways && pnpm install && npm publish
      - run: |
          cd packages/integration-events && pnpm install && npm publish
      - run: |
          cd packages/jobs && pnpm install && npm publish
      - run: |
          cd packages/logger && pnpm install && npm publish
      - run: |
          cd packages/maintenance && pnpm install && npm publish
      - run: |
          cd packages/migrations && pnpm install && npm publish
      - run: |
          cd packages/models && pnpm install && npm publish
      - run: |
          cd packages/modules && pnpm install && npm publish
      - run: |
          cd packages/normalizers && pnpm install && npm publish
      - run: |
          cd packages/persistence && pnpm install && npm publish
      - run: |
          cd packages/plugins && pnpm install && npm publish
      - run: |
          cd packages/ports && pnpm install && npm publish
      - run: |
          cd packages/query && pnpm install && npm publish
      - run: |
          cd packages/result && pnpm install && npm publish
      - run: |
          cd packages/rpc && pnpm install && npm publish
      - run: |
          cd packages/router && pnpm install && npm publish
      - run: |
          cd packages/scripts && pnpm install && npm publish
      - run: |
          cd packages/serializers && pnpm install && npm publish
      - run: |
          cd packages/services && pnpm install && npm publish
      - run: |
          cd packages/shared && pnpm install && npm publish
      - run: |
          cd packages/sql && pnpm install && npm publish
      - run: |
          cd packages/validators && pnpm install && npm publish
      - run: |
          cd packages/views && pnpm install && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}