name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true
      - run: |
          cd packages/adapters && vp install && vp test
      - run: |
          cd packages/aggregates && vp install && vp test
      - run: |
          cd packages/assets && vp install && vp test
      - run: |
          cd packages/contexts && vp install && vp test
      - run: |
          cd packages/controllers && vp install && vp test
      - run: |
          cd packages/domains && vp install && vp test
      - run: |
          cd packages/dtos && vp install && vp test
      - run: |
          cd packages/durable_objects && vp install && vp test
      - run: |
          cd packages/entrypoints && vp install && vp test
      - run: |
          cd packages/events && vp install && vp test
      - run: |
          cd packages/features && vp install && vp test
      - run: |
          cd packages/formatters && vp install && vp test
      - run: |
          cd packages/gateways && vp install && vp test
      - run: |
          cd packages/integration-events && vp install && vp test
      - run: |
          cd packages/jobs && vp install && vp test
      - run: |
          cd packages/logger && vp install && vp test
      - run: |
          cd packages/maintenance && vp install && vp test
      - run: |
          cd packages/migrations && vp install && vp test
      - run: |
          cd packages/models && vp install && vp test
      - run: |
          cd packages/modules && vp install && vp test
      - run: |
          cd packages/normalizers && vp install && vp test
      - run: |
          cd packages/persistence && vp install && vp test
      - run: |
          cd packages/plugins && vp install && vp test
      - run: |
          cd packages/ports && vp install && vp test
      - run: |
          cd packages/query && vp install && vp test
      - run: |
          cd packages/result && vp install && vp test
      - run: |
          cd packages/rpc && vp install && vp test
      - run: |
          cd packages/router && vp install && vp test
      - run: |
          cd packages/scripts && vp install && vp test
      - run: |
          cd packages/serializers && vp install && vp test
      - run: |
          cd packages/services && vp install && vp test
      - run: |
          cd packages/shared && vp install && vp test
      - run: |
          cd packages/sql && vp install && vp test
      - run: |
          cd packages/validators && vp install && vp test
      - run: |
          cd packages/views && vp install && vp test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true
      - run: |
          cd packages/adapters && vp install && vp pack
      - run: |
          cd packages/aggregates && vp install && vp pack
      - run: |
          cd packages/assets && vp install && vp pack
      - run: |
          cd packages/contexts && vp install && vp pack
      - run: |
          cd packages/controllers && vp install && vp pack
      - run: |
          cd packages/domains && vp install && vp pack
      - run: |
          cd packages/dtos && vp install && vp pack
      - run: |
          cd packages/durable_objects && vp install && vp pack
      - run: |
          cd packages/entrypoints && vp install && vp pack
      - run: |
          cd packages/events && vp install && vp pack
      - run: |
          cd packages/features && vp install && vp pack
      - run: |
          cd packages/formatters && vp install && vp pack
      - run: |
          cd packages/gateways && vp install && vp pack
      - run: |
          cd packages/integration-events && vp install && vp pack
      - run: |
          cd packages/jobs && vp install && vp pack
      - run: |
          cd packages/logger && vp install && vp pack
      - run: |
          cd packages/maintenance && vp install && vp pack
      - run: |
          cd packages/migrations && vp install && vp pack
      - run: |
          cd packages/models && vp install && vp pack
      - run: |
          cd packages/modules && vp install && vp pack
      - run: |
          cd packages/normalizers && vp install && vp pack
      - run: |
          cd packages/persistence && vp install && vp pack
      - run: |
          cd packages/plugins && vp install && vp pack
      - run: |
          cd packages/ports && vp install && vp pack
      - run: |
          cd packages/query && vp install && vp pack
      - run: |
          cd packages/result && vp install && vp pack
      - run: |
          cd packages/rpc && vp install && vp pack
      - run: |
          cd packages/router && vp install && vp pack
      - run: |
          cd packages/scripts && vp install && vp pack
      - run: |
          cd packages/serializers && vp install && vp pack
      - run: |
          cd packages/services && vp install && vp pack
      - run: |
          cd packages/shared && vp install && vp pack
      - run: |
          cd packages/sql && vp install && vp pack
      - run: |
          cd packages/validators && vp install && vp pack
      - run: |
          cd packages/views && vp install && vp pack

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true
      - run: |
          cd packages/adapters && vp install && npm publish
      - run: |
          cd packages/aggregates && vp install && npm publish
      - run: |
          cd packages/assets && vp install && npm publish
      - run: |
          cd packages/contexts && vp install && npm publish
      - run: |
          cd packages/controllers && vp install && npm publish
      - run: |
          cd packages/domains && vp install && npm publish
      - run: |
          cd packages/dtos && vp install && npm publish
      - run: |
          cd packages/durable_objects && vp install && npm publish
      - run: |
          cd packages/entrypoints && vp install && npm publish
      - run: |
          cd packages/events && vp install && npm publish
      - run: |
          cd packages/features && vp install && npm publish
      - run: |
          cd packages/formatters && vp install && npm publish
      - run: |
          cd packages/gateways && vp install && npm publish
      - run: |
          cd packages/integration-events && vp install && npm publish
      - run: |
          cd packages/jobs && vp install && npm publish
      - run: |
          cd packages/logger && vp install && npm publish
      - run: |
          cd packages/maintenance && vp install && npm publish
      - run: |
          cd packages/migrations && vp install && npm publish
      - run: |
          cd packages/models && vp install && npm publish
      - run: |
          cd packages/modules && vp install && npm publish
      - run: |
          cd packages/normalizers && vp install && npm publish
      - run: |
          cd packages/persistence && vp install && npm publish
      - run: |
          cd packages/plugins && vp install && npm publish
      - run: |
          cd packages/ports && vp install && npm publish
      - run: |
          cd packages/query && vp install && npm publish
      - run: |
          cd packages/result && vp install && npm publish
      - run: |
          cd packages/rpc && vp install && npm publish
      - run: |
          cd packages/router && vp install && npm publish
      - run: |
          cd packages/scripts && vp install && npm publish
      - run: |
          cd packages/serializers && vp install && npm publish
      - run: |
          cd packages/services && vp install && npm publish
      - run: |
          cd packages/shared && vp install && npm publish
      - run: |
          cd packages/sql && vp install && npm publish
      - run: |
          cd packages/validators && vp install && npm publish
      - run: |
          cd packages/views && vp install && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}