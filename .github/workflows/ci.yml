name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: true
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install
      - run: pnpm run format:check
      - run: pnpm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: true
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install
      - run: pnpm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: true
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install
      - run: pnpm run build
      - run: pnpm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: coverage/junit.xml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: true
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install
      - run: pnpm run build
