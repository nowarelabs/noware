name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
      - run: |
          cd packages/shared && vp install && vp test
      - run: |
          cd packages/adapters && vp install && vp test
      - run: |
          cd packages/aggregates && vp install && vp test
      - run: |
          cd packages/assets && vp install && vp test
      - run: |
          cd packages/contexts && vp install && vp test
      - run: |
          cd packages/controllers && vp install && vp test
