name: Publish

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Packages to publish (comma-separated, or "all" for all packages)'
        required: false
        default: "all"
      version:
        description: 'Version override (optional, e.g., "1.0.0")'
        required: false
        default: ""
      dry_run:
        description: "Dry run (no actual publish)"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.set-packages.outputs.packages }}
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: set-packages
        name: Determine packages to publish
        run: |
          if [[ "${{ github.event.inputs.packages }}" == "all" ]] || [[ "${{ github.event.inputs.packages }}" == "" ]]; then
            # No dependencies - publish first
            # Level 0: No workspace deps
            L0="noware-aggregates noware-assets noware-docs noware-domains noware-events noware-formatters noware-integration-events noware-logger noware-maintenance noware-normalizers noware-persistence noware-plugins noware-ports noware-query noware-result noware-scripts noware-shared noware-validators noware-views"
            
            # Level 1: Depends on level 0
            L1="noware-modules noware-features"
            
            # Level 2: Depends on level 1
            L2="noware-contexts noware-gateways"
            
            # Level 3: Depends on level 2 or existing
            L3="noware-jobs noware-durable-objects noware-router noware-services noware-migrations noware-models"
            
            # Level 4: Depends on level 3
            L4="noware-controllers noware-entrypoints noware-rpc noware-sql"
            
            # Level 5: Depends on level 4
            L5="noware-durable-objects"
            
            echo "packages=$L0 $L1 $L2 $L3 $L4 $L5" >> $GITHUB_OUTPUT
          else
            echo "packages=${{ github.event.inputs.packages }}" >> $GITHUB_OUTPUT
          fi

      - id: set-version
        name: Determine version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/tags/v"* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0" >> $GITHUB_OUTPUT
          fi

  publish:
    needs: prepare
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            echo "value=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/tags/v"* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "value=0.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Publish packages in order
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ steps.version.outputs.value }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          # Package publish order based on dependencies
          # Level 0: No workspace dependencies
          L0="noware-aggregates noware-assets noware-docs noware-domains noware-events noware-formatters noware-integration-events noware-logger noware-maintenance noware-normalizers noware-persistence noware-plugins noware-ports noware-query noware-result noware-scripts noware-shared noware-validators noware-views"
          
          # Level 1: Depends on L0
          L1="noware-modules noware-features"
          
          # Level 2: Depends on L1
          L2="noware-contexts noware-gateways"
          
          # Level 3: Depends on L0/L2
          L3="noware-jobs noware-router noware-services"
          
          # Level 4: Depends on L3
          L4="noware-controllers noware-entrypoints noware-migrations noware-models noware-sql"
          
          # Level 5: Depends on L4
          L5="noware-durable-objects noware-rpc"
          
          # Combine all levels
          ALL_LEVELS="$L0 $L1 $L2 $L3 $L4 $L5"
          
          for pkg in $ALL_LEVELS; do
            # Extract directory name from package name (noware-aggregates -> aggregates)
            pkg_dir="packages/${pkg#noware-}"
            
            if [[ ! -d "$pkg_dir" ]]; then
              echo "Warning: Package directory $pkg_dir does not exist, skipping..."
              continue
            fi
            
            cd "$pkg_dir"
            
            # Install dependencies (without workspace to get published versions)
            echo "Installing dependencies for $pkg..."
            pnpm install --frozen-lockfile --prefer-offline 2>/dev/null || pnpm install 2>/dev/null || true
            
            # Build package
            echo "Building $pkg..."
            pnpm run build 2>/dev/null || npm run build 2>/dev/null || true
            
            # Set version
            if [[ "$VERSION" != "" && "$VERSION" != "0.0.0" ]]; then
              npm version "$VERSION" --no-git-tag-version --allow-same-version 2>/dev/null || true
            fi
            
            # Publish
            if [[ "$DRY_RUN" == "true" ]]; then
              echo "Dry-run: would publish $pkg at version $(node -p 'require("./package.json").version' 2>/dev/null || echo "unknown")"
              npm publish --dry-run 2>/dev/null || echo "  (dry run skipped)"
            else
              current_version=$(node -p 'require("./package.json").version' 2>/dev/null || echo "0.0.0")
              echo "Publishing $pkg at version $current_version"
              npm publish --access public 2>/dev/null || echo "  (publish skipped)"
            fi
            
            cd ../..
          done